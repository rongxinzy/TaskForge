name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: taskforge
          POSTGRES_PASSWORD: taskforge
          POSTGRES_DB: taskforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schemas
        run: pnpm db:validate

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build workspace packages
        run: pnpm turbo run build --filter=!@taskforge/web

      - name: Lint / typecheck
        run: |
          pnpm lint
          pnpm typecheck

      - name: SQLite smoke test
        env:
          DATABASE_URL: file:./packages/db/test.db
        run: |
          pnpm --filter @taskforge/db migrate:deploy
          pnpm --filter @taskforge/db seed

      - name: Unit tests
        run: pnpm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
